
$CLOCK_FONT = Inter Variable
$FONT = Inter Variable
$MONOSPACE_FONT = CaskaydiaCove Nerd Font Propo

animations {
  animation = fadeIn, 0
  animation = fadeOut, 1, 10
}

background {
  path = $BACKGROUND_PATH
  color = $primary_container
  blur_passes = 2
  blur_size = 4
  brightness = 0.75
  vibrancy = 0
}

# --- Shadow effect --- #

shape {
  size = 100%, 1
  color = rgb(000000)
  shadow_passes = 4
  shadow_size = 12
  shadow_color = $shadow
  shadow_boost = 1.5
  position = 0, 0
  halign = center
  valign = top
  zindex = 1
}

shape {
  size = 100%, 1
  color = rgb(000000)
  shadow_passes = 4
  shadow_size = 12
  shadow_color = $shadow
  shadow_boost = 5.0
  position = 0, 0
  halign = center
  valign = bottom
  zindex = 1
}

# --- Clock --- #

label {
  color = $primary_fixed_dim
  shadow_passes = 1
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  text = cmd[update:1000] echo "<span font_features='tnum'>$(date +%H)</span><span foreground='$outline_dark_hex' font_features='tnum'>:</span><span font_features='tnum' fgcolor='$secondary_fixed_dim_hex'>$(date +%M)</span>"
  font_size = 96
  font_family = $CLOCK_FONT SemiBold
  halign = center
  valign = center
  position = 0, 175
  zindex = 2
}

label {
  color = $surface_light
  shadow_passes = 1
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  text = cmd[update:1000] date "+%A, %d %B %Y"
  font_size = 16
  font_family = $CLOCK_FONT Light
  halign = center
  valign = center
  position = 0, 100
  zindex = 2
}

# --- User/Album image --- #

image {
  shadow_passes = 1
  shadow_size = 4
  shadow_color = $shadow
  shadow_boost = 1.0
  path = $PROFILE_IMAGE
  reload_cmd = $SCRIPTS_PATH/mpris-art.sh $PROFILE_IMAGE
  reload_time = 1
  border_size = 0
  border_color = $outline
  size = 150
  halign = center
  valign = center
  position = 0, -70
  rounding = 4
  zindex = 2
  onclick = playerctl play-pause && pkill -USR2 hyprlock
}

# --- Media status / Greeting message --- #

label {
  color = $surface_light
  shadow_passes = 1
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  text = cmd[update:1000:1] if [ "$(playerctl status)" = "Playing" ]; then echo "<span weight='bold'>Playing:</span> $($SCRIPTS_PATH/truncate.sh "$(playerctl metadata xesam:title)" 30)"; elif [ "$(playerctl status)" = "Paused" ]; then echo "<span weight='bold'>Paused:</span> <span color='$surface_variant_light_hex'>$($SCRIPTS_PATH/truncate.sh "$(playerctl metadata xesam:title)" 30)</span>"; else echo "Good "$(if [ $(date +%-H) -lt 12 ]; then echo "Morning"; elif [ $(date +%-H) -lt 18 ]; then echo "Afternoon"; else echo "Evening"; fi)", $USER"; fi
  font_size = 12
  font_family = $FONT SemiLight
  position = 0, -300
  halign = center
  valign = center
  zindex = 2
}

# --- Media control buttons --- #

label {
  text = cmd[update:1000:1] [[ "$(playerctl status)" && "$(playerctl status)" != "Stopped" ]] && echo "󰼨"
  color = $secondary_fixed
  shadow_passes = 1
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  font_size = 48
  font_family = $MONOSPACE_FONT
  position = -120, -70
  halign = center
  valign = center
  zindex = 2
  onclick = playerctl previous && pkill -USR2 hyprlock
}

label {
  text = cmd[update:1000:1] if [ "$(playerctl status)" = "Playing" ]; then echo "󰏤"; elif [ "$(playerctl status)" = "Paused" ]; then echo "󰐊"; fi
  color = rgba(eeeeeeaa)
  shadow_passes = 1
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.0
  font_size = 60
  font_family = $MONOSPACE_FONT
  position = 0, -70
  halign = center
  valign = center
  zindex = 3
}

label {
  text = cmd[update:1000:1] [[ "$(playerctl status)" && "$(playerctl status)" != "Stopped" ]] && echo "󰼧"
  color = $secondary_fixed
  shadow_passes = 1
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  font_size = 48
  font_family = $MONOSPACE_FONT
  position = 120, -70
  halign = center
  valign = center
  zindex = 2
  onclick = playerctl next && pkill -USR2 hyprlock
}

# --- Input field --- #

input-field {
  size = 250, 40
  outline_thickness = 2
  dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
  dots_spacing = 0.4 # Scale of dots' absolute size, 0.0 - 1.0
  dots_center = false
  dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
  outer_color = $outline
  inner_color = $surface_container
  font_color = $primary
  font_family = $FONT
  fade_on_empty = false
  fade_timeout = 2000
  placeholder_text = Enter Password... # Text rendered in the input box when it's empty.
  hide_input = false
  rounding = 4 # -1 means complete rounding (circle/oval)
  check_color = $primary
  fail_color = $error # if authentication failed, changes outer_color and fail message color
  fail_text = <b>$FAIL ($ATTEMPTS)</b> # can be set to empty
  fail_transition = 300 # transition time in ms between normal outer_color and fail_color
  capslock_color = $tertiary
  numlock_color = $outline
  bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
  invert_numlock = false # change color if numlock is off
  swap_font_color = false # see below
  position = 30, -250
  halign = center
  valign = center
  shadow_passes = 1
  shadow_size = 4
  shadow_color = $shadow
  shadow_boost = 1.0
  zindex = 2
}

# --- Lock symbol container --- #

shape {
  size = 40, 40
  color = $surface_container
  shadow_passes = 1
  shadow_size = 3
  shadow_color = $shadow
  shadow_boost = 1.0
  position = -130, -250
  border_size = 2
  border_color = $outline
  halign = center
  valign = center
  rounding = 4
  zindex = 1
}

# --- Lock symbol --- #

label {
  color = $primary
  shadow_passes = 1
  shadow_size = 0
  shadow_color = $shadow
  shadow_boost = 1.0
  text = 󰌾
  font_size = 20
  font_family = $MONOSPACE_FONT
  halign = center
  valign = center
  position = -130, -250
  zindex = 2
}

# --- Power buttons --- #

label {
  text = 󰐥
  color = $error_dark
  shadow_passes = 1
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  font_size = 18
  font_family = $MONOSPACE_FONT
  position = -20, 10
  halign = right
  valign = bottom
  zindex = 2
  onclick = systemctl poweroff
}

label {
  text = 󰍃
  color = $secondary_fixed
  shadow_passes = 1
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  font_size = 18
  font_family = $MONOSPACE_FONT
  position = -70, 10
  halign = right
  valign = bottom
  zindex = 2
  onclick = niri msg action quit -s
}

label {
  text = 󰤄
  color = $yellow_dark
  shadow_passes = 1
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  font_size = 18
  font_family = $MONOSPACE_FONT
  position = -125, 10
  halign = right
  valign = bottom
  zindex = 2
  onclick = systemctl suspend
}

# --- Layout indicator --- #

label {
  color = $surface_light
  shadow_passes = 1
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  text = $LAYOUT
  font_size = 12
  font_family = $FONT
  position = 20, 10
  halign = left
  valign = bottom
  zindex = 2
  onclick = niri msg action switch-layout next
}

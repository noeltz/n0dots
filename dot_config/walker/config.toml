force_keyboard_focus = true                                                 # forces keyboard forcus to stay in Walker
selection_wrap = true                                                       # wrap list if at bottom or top
theme = "n0_dots"                                                   # theme to use
# additional_theme_location = "~/.local/share/omarchy/default/walker/themes/"
hide_action_hints = true                                                    # globally hide the action hints

[placeholders]
"default" = { input = " Search…", list = "No Results" } # placeholders for input and empty list, key is the providers name, so f.e. "desktopapplications" or "menus:other"

[keybinds]
quick_activate = []

[columns]
symbols = 3 # providers to be queried by default

[providers.sets.run]
default = ["runner"]
empty = ["runner"]

[providers.sets.window]
default = ["windows"]
empty = ["windows"]

[providers.sets.clippy]
default = ["clipboard"]
empty = ["clipboard"]

[providers]
max_results = 256 # 256 should be enough for everyone
default = [
  "desktopapplications",
  "menus"
]

empty = ["desktopapplications"]

[[providers.prefixes]]
prefix = "/"
provider = "providerlist"

[[providers.prefixes]]
prefix = "."
provider = "files"

[[providers.prefixes]]
prefix = ":"
provider = "symbols"

[[providers.prefixes]]
prefix = "="
provider = "calc"

[[providers.prefixes]]
prefix = "@"
provider = "websearch"

[[providers.prefixes]]
prefix = "$"
provider = "clipboard"

[[emergencies]]
text = "Restart Elephant"
command = "bash ~/Dotfiles/bin/restart-walker" 
